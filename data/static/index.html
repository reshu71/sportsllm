<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>APEX Coach</title>
<style>
body { font-family: sans-serif; background:#111; color:#eee; padding:20px; }
#messages { margin-bottom:20px; white-space:pre-wrap; }
textarea { width:100%; height:80px; }
button { padding:8px 16px; margin-top:5px; }
</style>
</head>
<body>

<h2>APEX — Endurance AI</h2>
<div id="messages"></div>

<textarea id="input" placeholder="Ask something..."></textarea>
<br>
<button onclick="send()">Send</button>

<script>
async function send() {
  const input = document.getElementById("input");
  const msg = input.value.trim();
  if (!msg) return;

  append("You: " + msg + "\n");
  input.value = "";

  const res = await fetch("/api/chat/stream", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({ message: msg, history: [] })
  });

  const reader = res.body.getReader();
  const decoder = new TextDecoder();

  let buffer = "";
  let answer = "";

  while (true) {
    const { done, value } = await reader.read();
    if (done) break;

    buffer += decoder.decode(value, { stream:true });

    let match;
    while ((match = buffer.match(/([\s\S]*?)\r?\n\r?\n/))) {
      const block = match[1];
      buffer = buffer.slice(match[0].length);

      let event = "";
      let data = "";

      block.split(/\r?\n/).forEach(line => {
        if (line.startsWith("event:")) event = line.slice(6).trim();
        if (line.startsWith("data:")) data += line.slice(5).trim();
      });

      if (event === "token") {
        answer += data;
        document.getElementById("messages").innerText =
          document.getElementById("messages").innerText + data;
      }

      if (event === "done") {
        append("\n\n");
      }
    }
  }
}

function append(text) {
  document.getElementById("messages").innerText += text;
}
</script>

</body>
</html>
